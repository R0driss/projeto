<!DOCTYPE html>
<html>
<head>
    <title>Estoque</title>
</head>
<body>

<h2>Cadastrar Peça</h2>

<form action="/estoque" method="post">
    <input type="text" name="nome_peca" placeholder="Nome da peça"><br><br>
    <input type="number" name="quantidade" placeholder="Quantidade"><br><br>
    <input type="number" step="0.01" name="preco" placeholder="Preço"><br><br>
    <button type="submit">Cadastrar</button>
</form>

<hr>

<h2>Peças no estoque</h2>

<ul>
    {% for item in estoque %}
        <li>
            ID: {{ item.id }} - {{ item.nome_peca }} ({{ item.quantidade }})
        </li>
    {% endfor %}
</ul>

<hr>

<h2>Apagar peça</h2>

<input type="number" id="id_apagar" placeholder="Digite o ID da peça">
<button onclick="apagar()">Apagar</button>

<script>
function apagar() {
    let id = document.getElementById("id_apagar").value;

    fetch('/estoque/' + id, {
        method: 'DELETE'
    }).then(() => location.reload());
}
</script>

</body>
</html>
